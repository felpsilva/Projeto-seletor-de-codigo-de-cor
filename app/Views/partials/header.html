<header class="site-header">
    <a href="{{ routes.home[locale] }}" class="logo-wrap" aria-label="{{ dict.common.site_name }}">
        <span class="logo-dot"></span>
        <div>
            <p class="logo-title">{{ dict.common.site_name }}</p>
            <p class="logo-subtitle">{{ dict.common.tagline }}</p>
        </div>
    </a>

    {% include 'partials/nav.html' %}

    <div class="header-controls">
        <select id="lang-switch" aria-label="{{ dict.common.language }}">
            <option value="{{ routes[current_route]['pt'] }}" {{ locale=='pt' ? 'selected' : '' }}>Português</option>
            <option value="{{ routes[current_route]['en'] }}" {{ locale=='en' ? 'selected' : '' }}>English</option>
            <option value="{{ routes[current_route]['es'] }}" {{ locale=='es' ? 'selected' : '' }}>Español</option>
        </select>
        <button id="theme-toggle" class="ghost-btn" aria-label="{{ dict.common.theme_toggle }}">☼</button>
        <button id="menu-toggle" class="menu-toggle" aria-label="Abrir menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</header>

<nav id="mobile-menu" class="mobile-menu" aria-label="Menu mobile">
    <div class="mobile-menu-content">
        <a href="{{ routes.home[locale] }}" class="mobile-nav-link">{{ dict.common.nav_home }}</a>
        <a href="{{ routes.about[locale] }}" class="mobile-nav-link">{{ dict.common.nav_about }}</a>
        <a href="{{ routes.contact[locale] }}" class="mobile-nav-link">{{ dict.common.nav_contact }}</a>
        <a href="{{ routes.privacy[locale] }}" class="mobile-nav-link">{{ dict.common.nav_privacy }}</a>
        <a href="{{ routes.terms[locale] }}" class="mobile-nav-link">{{ dict.common.nav_terms }}</a>
    </div>
</nav>

<div id="menu-overlay" class="menu-overlay"></div>

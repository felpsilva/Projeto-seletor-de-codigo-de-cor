services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: color-picker-app
    volumes:
      - ./:/var/www
      - vendor-data:/var/www/vendor
    environment:
      APP_URL: http://localhost:8080
      ENABLE_ADS: "false"
      GOOGLE_ANALYTICS_ID: G-XXXXXXXXXX
      GOOGLE_ADSENSE_CLIENT: ca-pub-0000000000000000

  webserver:
    image: nginx:1.27-alpine
    container_name: color-picker-nginx
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  vendor-data:
